version: '3.8'

services:
  app:
    build: .
    container_name: linkcloud-app
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://linkcloud:${DB_PASSWORD}@db:5432/linkcloud
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web

  db:
    image: postgres:16-alpine
    container_name: linkcloud-db
    restart: always
    environment:
      POSTGRES_DB: linkcloud
      POSTGRES_USER: linkcloud
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkcloud"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: linkcloud-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    depends_on:
      - app
    networks:
      - web

  certbot:
    image: certbot/certbot
    container_name: linkcloud-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  certbot-etc:
  certbot-var:
  webroot:

networks:
  internal:
  web:
