<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0f1f;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #667eea; }
    .back { color: #667eea; text-decoration: none; display: inline-block; margin-bottom: 20px; }

    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; }

    .big-number { font-size: 48px; font-weight: 700; color: #667eea; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }

    .list-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .list-item:last-child { border-bottom: none; }
    .list-name { color: #fff; }
    .list-count { color: #667eea; font-weight: 700; }

    .flag { font-size: 20px; margin-right: 8px; }

    .recent-table { width: 100%; border-collapse: collapse; }
    .recent-table th { text-align: left; padding: 10px; color: #888; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .recent-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 14px; }

    .loading { text-align: center; padding: 40px; color: #888; }
    .error { background: #ff4444; color: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }

    .btn {
      background: #667eea;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    .btn:hover { background: #5a6fd6; }
    .btn-danger { background: #e74c3c; }
    .btn-danger:hover { background: #c0392b; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/admin" class="back">← Back to Admin</a>
    <h1>📊 Analytics Dashboard</h1>

    <div id="actions" style="margin-bottom: 20px;">
      <button class="btn" onclick="loadData()">🔄 Refresh</button>
      <button class="btn" onclick="testClick()">🧪 Test Click</button>
      <button class="btn btn-danger" onclick="resetTable()">🗑️ Reset All Data</button>
    </div>

    <div id="content">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    // Check auth first
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/check', { credentials: 'include' });
        if (!res.ok) {
          window.location.href = '/admin';
          return false;
        }
        return true;
      } catch (e) {
        window.location.href = '/admin';
        return false;
      }
    }

    // Get flag emoji from country code
    function getFlag(code) {
      if (!code || code === 'XX') return '🌍';
      try {
        const codePoints = code.toUpperCase().split('').map(char => 127397 + char.charCodeAt());
        return String.fromCodePoint(...codePoints);
      } catch (e) {
        return '🌍';
      }
    }

    // Format time
    function formatTime(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    // Load analytics data
    async function loadData() {
      document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch('/api/analytics/stats?days=30', { credentials: 'include' });
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        renderData(data);
      } catch (e) {
        document.getElementById('content').innerHTML = `<div class="error">Error: ${e.message}</div>`;
      }
    }

    // Render the data
    function renderData(data) {
      const { total, byCountry, byDevice, byOS, byBrowser, bySource, topLinks, recent } = data;

      let html = `
        <div class="grid">
          <div class="card">
            <h2>Total Clicks</h2>
            <div class="big-number">${total || 0}</div>
          </div>
        </div>

        <div class="card" style="margin-bottom:20px;">
          <h2>📍 By Traffic Source</h2>
          <p style="color:#666;font-size:12px;margin-bottom:12px;">Use ?src=NAME in your links (e.g., cmehere.net?src=ig1)</p>
          ${renderSourceList(bySource)}
        </div>

        <div class="grid">
          <div class="card">
            <h2>🌍 By Country</h2>
            ${renderList(byCountry, 'country', 'country_code')}
          </div>
          <div class="card">
            <h2>📱 By Device</h2>
            ${renderList(byDevice, 'device')}
          </div>
        </div>

        <div class="grid">
          <div class="card">
            <h2>💻 By OS</h2>
            ${renderList(byOS, 'os')}
          </div>
          <div class="card">
            <h2>🌐 By Browser</h2>
            ${renderList(byBrowser, 'browser')}
          </div>
        </div>

        <div class="card">
          <h2>🔗 Top Links</h2>
          ${renderList(topLinks, 'link_title')}
        </div>

        <div class="card">
          <h2>🕐 Recent Clicks</h2>
          ${renderRecentTable(recent)}
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    // Render a simple list
    function renderList(items, nameKey, codeKey) {
      if (!items || items.length === 0) {
        return '<div style="color:#666;padding:10px;">No data yet</div>';
      }
      return items.map(item => {
        const name = item[nameKey] || 'Unknown';
        const flag = codeKey ? getFlag(item[codeKey]) : '';
        return `
          <div class="list-item">
            <span class="list-name">${flag ? '<span class="flag">' + flag + '</span>' : ''}${name}</span>
            <span class="list-count">${item.clicks}</span>
          </div>
        `;
      }).join('');
    }

    // Render traffic sources with icons
    function renderSourceList(sources) {
      if (!sources || sources.length === 0) {
        return '<div style="color:#666;padding:10px;">No sources yet. Add ?src=NAME to your links!</div>';
      }

      const getSourceIcon = (src) => {
        if (!src) return '📊';
        src = src.toLowerCase();
        if (src.includes('ig') || src.includes('instagram')) return '📸';
        if (src.includes('twitter') || src.includes('tw') || src.includes('x-')) return '🐦';
        if (src.includes('tiktok') || src.includes('tt')) return '🎵';
        if (src.includes('snap')) return '👻';
        if (src.includes('fb') || src.includes('facebook')) return '📘';
        if (src.includes('yt') || src.includes('youtube')) return '📺';
        if (src.includes('email') || src.includes('mail')) return '📧';
        if (src.includes('whatsapp') || src.includes('wa')) return '💬';
        return '🔗';
      };

      return sources.map(item => `
        <div class="list-item">
          <span class="list-name">
            <span style="font-size:18px;margin-right:8px;">${getSourceIcon(item.source)}</span>
            ${item.source}
          </span>
          <span class="list-count">${item.clicks}</span>
        </div>
      `).join('');
    }

    // Render recent clicks table
    function renderRecentTable(recent) {
      if (!recent || recent.length === 0) {
        return '<div style="color:#666;padding:10px;">No clicks yet</div>';
      }
      const rows = recent.map(r => `
        <tr>
          <td>${r.link_title || 'Link'}</td>
          <td>${r.source ? '<span style="color:#667eea;font-size:12px;">' + r.source + '</span>' : '-'}</td>
          <td>${getFlag(r.country_code)} ${r.country || 'Unknown'}</td>
          <td>${r.device || '-'}</td>
          <td style="color:#888;">${formatTime(r.clicked_at)}</td>
        </tr>
      `).join('');

      return `
        <table class="recent-table">
          <thead><tr><th>Link</th><th>Source</th><th>Location</th><th>Device</th><th>Time</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // Test click
    async function testClick() {
      try {
        const res = await fetch('/api/analytics/test-click', { method: 'POST', credentials: 'include' });
        const data = await res.json();
        alert('Test click added!\nIP: ' + data.detected_ip + '\nCountry: ' + data.detected_country + '\nTotal: ' + data.total_clicks);
        loadData();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    // Reset table
    async function resetTable() {
      if (!confirm('Are you sure you want to DELETE ALL analytics data? This cannot be undone!')) return;

      try {
        const res = await fetch('/api/analytics/reset', { method: 'POST', credentials: 'include' });
        const data = await res.json();
        alert(data.message || 'Done!');
        loadData();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    // Init
    checkAuth().then(ok => {
      if (ok) loadData();
    });
  </script>
</body>
</html>
