<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkCloud Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --bg-main: #0f0f1e;
            --bg-card: #1a1a2e;
            --bg-elevated: #242438;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .auto-save {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            opacity: 0.9;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .save-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-right {
            display: flex;
            gap: 12px;
        }

        .btn-header {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-preview {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-preview:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-logout {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .btn-logout:hover {
            background: rgba(255, 71, 87, 0.3);
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 480px 1fr;
            height: calc(100vh - 64px);
            gap: 1px;
            background: var(--border);
        }

        /* Editor Panel */
        .editor-panel {
            background: var(--bg-main);
            overflow-y: auto;
            padding: 24px;
        }

        .editor-panel::-webkit-scrollbar {
            width: 6px;
        }

        .editor-panel::-webkit-scrollbar-track {
            background: var(--bg-card);
        }

        .editor-panel::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        /* Card Sections */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            transition: var(--transition);
        }

        .section:hover {
            border-color: rgba(102, 126, 234, 0.3);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            user-select: none;
        }

        .section-icon {
            font-size: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            flex: 1;
        }

        .section-toggle {
            font-size: 12px;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .section.collapsed .section-body {
            display: none;
        }

        .section.collapsed .section-toggle {
            transform: rotate(-90deg);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input,
        .textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }

        .input:focus,
        .textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .textarea {
            resize: vertical;
            min-height: 60px;
        }

        /* Image Upload Zones */
        .upload-container {
            position: relative;
        }

        .upload-zone {
            position: relative;
            border: 2px dashed var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-elevated);
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
        }

        .upload-zone.has-image {
            border-style: solid;
            border-color: var(--primary);
        }

        .cover-upload {
            height: 140px;
        }

        .avatar-upload {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto;
        }

        .upload-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .upload-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 13px;
            gap: 8px;
            pointer-events: none;
        }

        .upload-placeholder-icon {
            font-size: 32px;
            opacity: 0.5;
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .edit-image-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
            z-index: 10;
        }

        .upload-zone:hover .edit-image-btn {
            opacity: 1;
        }

        /* Preview Panel */
        .preview-panel {
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .preview-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .phone-mockup {
            width: 380px;
            height: 760px;
            background: #000;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 28px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #f0f2f5;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
        }

        .phone-screen iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Image Cropper Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .crop-container {
            position: relative;
            background: var(--bg-elevated);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .crop-image {
            max-width: 100%;
            max-height: 100%;
            cursor: move;
            user-select: none;
        }

        .crop-controls {
            margin-bottom: 24px;
        }

        .slider-group {
            margin-bottom: 16px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--bg-elevated);
            border-radius: 3px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* Loading State */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section {
            animation: slideIn 0.4s ease backwards;
        }

        .section:nth-child(1) { animation-delay: 0.05s; }
        .section:nth-child(2) { animation-delay: 0.1s; }
        .section:nth-child(3) { animation-delay: 0.15s; }
        .section:nth-child(4) { animation-delay: 0.2s; }

        /* Mobile Responsive */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            .preview-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">⚡ LinkCloud Studio</div>
            <div class="auto-save">
                <div class="save-indicator"></div>
                <span>Auto-saved</span>
            </div>
        </div>
        <div class="header-right">
            <button class="btn-header btn-preview" onclick="openPreview()">👁️ Preview</button>
            <button class="btn-header btn-logout" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Editor Panel -->
        <div class="editor-panel">
            <!-- Profile Section -->
            <div class="section" id="sectionProfile">
                <div class="section-header" onclick="toggleSection('sectionProfile')">
                    <span class="section-icon">👤</span>
                    <h2 class="section-title">Profile</h2>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="section-body">
                    <div class="form-group">
                        <label class="label">Cover Image</label>
                        <div class="upload-container">
                            <div class="upload-zone cover-upload" id="coverZone">
                                <img id="coverImg" style="display: none;">
                                <div class="upload-placeholder" id="coverPlaceholder">
                                    <div class="upload-placeholder-icon">📸</div>
                                    <div>Click or drag to upload</div>
                                </div>
                                <input type="file" accept="image/*" onchange="uploadImage(this, 'cover')">
                            </div>
                            <button class="edit-image-btn" onclick="openCropper('cover')" style="display: none;" id="editCoverBtn">
                                ✂️ Edit
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="label">Avatar</label>
                        <div class="upload-container">
                            <div class="upload-zone avatar-upload" id="avatarZone">
                                <img id="avatarImg" style="display: none;">
                                <div class="upload-placeholder" id="avatarPlaceholder">
                                    <div class="upload-placeholder-icon">👤</div>
                                    <div>Upload</div>
                                </div>
                                <input type="file" accept="image/*" onchange="uploadImage(this, 'avatar')">
                            </div>
                            <button class="edit-image-btn" onclick="openCropper('avatar')" style="display: none;" id="editAvatarBtn">
                                ✂️ Edit
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="label">Name</label>
                        <input type="text" class="input" id="profileName" placeholder="Your Name" oninput="updatePreview()">
                    </div>

                    <div class="form-group">
                        <label class="label">Bio</label>
                        <textarea class="textarea" id="profileBio" placeholder="Tell your story..." oninput="updatePreview()"></textarea>
                    </div>
                </div>
            </div>

            <!-- Social Links Section -->
            <div class="section" id="sectionSocials">
                <div class="section-header" onclick="toggleSection('sectionSocials')">
                    <span class="section-icon">🔗</span>
                    <h2 class="section-title">Social Links</h2>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="section-body">
                    <div id="socialsList"></div>
                    <button class="btn btn-secondary" style="width: 100%; margin-top: 12px;" onclick="addSocial()">
                        ➕ Add Link
                    </button>
                </div>
            </div>
        </div>

        <!-- Preview Panel -->
        <div class="preview-panel">
            <div class="preview-label">Live Preview</div>
            <div class="phone-mockup">
                <div class="phone-notch"></div>
                <div class="phone-screen">
                    <iframe id="previewFrame" src="/"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Cropper Modal -->
    <div class="modal-overlay" id="cropperModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Crop & Position</h3>
                <button class="modal-close" onclick="closeCropper()">✕</button>
            </div>
            <div class="crop-container" id="cropContainer">
                <img id="cropImage" class="crop-image">
            </div>
            <div class="crop-controls">
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Zoom</span>
                        <span id="zoomValue">100%</span>
                    </div>
                    <input type="range" class="slider" id="zoomSlider" min="100" max="200" value="100" oninput="updateZoom()">
                </div>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Horizontal Position</span>
                        <span id="posXValue">50%</span>
                    </div>
                    <input type="range" class="slider" id="posXSlider" min="0" max="100" value="50" oninput="updatePosition()">
                </div>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Vertical Position</span>
                        <span id="posYValue">50%</span>
                    </div>
                    <input type="range" class="slider" id="posYSlider" min="0" max="100" value="50" oninput="updatePosition()">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeCropper()">Cancel</button>
                <button class="btn btn-primary" onclick="applyCrop()">✓ Apply</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentCropType = null;
        let imageData = {
            cover: { url: '', posX: 50, posY: 50, zoom: 100 },
            avatar: { url: '', posX: 50, posY: 50, zoom: 100 }
        };
        let autoSaveTimeout = null;

        // Initialize
        function init() {
            loadContent();
            setupDragAndDrop();
        }

        // Load Content
        async function loadContent() {
            try {
                const res = await fetch('/api/content');
                const data = await res.json();

                if (data && data.profile) {
                    document.getElementById('profileName').value = data.profile.name || '';
                    document.getElementById('profileBio').value = data.profile.bio || '';

                    if (data.profile.coverUrl) {
                        setImage('cover', data.profile.coverUrl);
                        imageData.cover.posX = data.profile.coverPosX || 50;
                        imageData.cover.posY = data.profile.coverPosY || 50;
                    }

                    if (data.profile.avatarUrl) {
                        setImage('avatar', data.profile.avatarUrl);
                        imageData.avatar.posX = data.profile.avatarPosX || 50;
                        imageData.avatar.posY = data.profile.avatarPosY || 50;
                    }
                }

                updatePreview();
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        // Image Upload with Maximum Quality
        async function uploadImage(input, type) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');

                    // Maximum quality - 1920px width
                    let w = img.width;
                    let h = img.height;
                    const maxW = 1920;

                    if (w > maxW) {
                        const ratio = maxW / w;
                        w = maxW;
                        h = Math.round(h * ratio);
                    }

                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);

                    // PNG if has transparency, else JPEG 95%
                    const isPNG = file.type === 'image/png';
                    const dataUrl = canvas.toDataURL(isPNG ? 'image/png' : 'image/jpeg', 0.95);

                    setImage(type, dataUrl);
                    scheduleAutoSave();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Set Image
        function setImage(type, url) {
            const img = document.getElementById(type + 'Img');
            const placeholder = document.getElementById(type + 'Placeholder');
            const zone = document.getElementById(type + 'Zone');
            const editBtn = document.getElementById('edit' + type.charAt(0).toUpperCase() + type.slice(1) + 'Btn');

            img.src = url;
            img.style.display = 'block';
            placeholder.style.display = 'none';
            zone.classList.add('has-image');
            if (editBtn) editBtn.style.display = 'block';

            imageData[type].url = url;
            updateImagePosition(type);
            updatePreview();
        }

        // Image Cropper
        function openCropper(type) {
            currentCropType = type;
            const modal = document.getElementById('cropperModal');
            const cropImg = document.getElementById('cropImage');

            cropImg.src = imageData[type].url;
            document.getElementById('zoomSlider').value = imageData[type].zoom;
            document.getElementById('posXSlider').value = imageData[type].posX;
            document.getElementById('posYSlider').value = imageData[type].posY;

            updateZoom();
            updatePosition();
            modal.classList.add('active');
        }

        function closeCropper() {
            document.getElementById('cropperModal').classList.remove('active');
        }

        function updateZoom() {
            const zoom = document.getElementById('zoomSlider').value;
            document.getElementById('zoomValue').textContent = zoom + '%';
            document.getElementById('cropImage').style.transform = `scale(${zoom / 100})`;
        }

        function updatePosition() {
            const x = document.getElementById('posXSlider').value;
            const y = document.getElementById('posYSlider').value;
            document.getElementById('posXValue').textContent = x + '%';
            document.getElementById('posYValue').textContent = y + '%';

            const img = document.getElementById('cropImage');
            img.style.objectPosition = `${x}% ${y}%`;
        }

        function applyCrop() {
            if (!currentCropType) return;

            imageData[currentCropType].zoom = parseInt(document.getElementById('zoomSlider').value);
            imageData[currentCropType].posX = parseInt(document.getElementById('posXSlider').value);
            imageData[currentCropType].posY = parseInt(document.getElementById('posYSlider').value);

            updateImagePosition(currentCropType);
            closeCropper();
            scheduleAutoSave();
            updatePreview();
        }

        function updateImagePosition(type) {
            const img = document.getElementById(type + 'Img');
            const data = imageData[type];
            img.style.objectPosition = `${data.posX}% ${data.posY}%`;
        }

        // Live Preview Update
        function updatePreview() {
            scheduleAutoSave();
            // Refresh iframe
            const iframe = document.getElementById('previewFrame');
            iframe.src = iframe.src;
        }

        // Auto-save with debounce
        function scheduleAutoSave() {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(saveContent, 2000);
        }

        async function saveContent() {
            try {
                const content = {
                    profile: {
                        name: document.getElementById('profileName').value,
                        bio: document.getElementById('profileBio').value,
                        coverUrl: imageData.cover.url,
                        coverPosX: imageData.cover.posX,
                        coverPosY: imageData.cover.posY,
                        avatarUrl: imageData.avatar.url,
                        avatarPosX: imageData.avatar.posX,
                        avatarPosY: imageData.avatar.posY,
                        verified: false
                    },
                    socials: [],
                    feats: [],
                    cars: []
                };

                const res = await fetch('/api/content', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(content)
                });

                if (res.ok) {
                    console.log('✅ Auto-saved');
                }
            } catch (e) {
                console.error('Save error:', e);
            }
        }

        // Section Toggle
        function toggleSection(id) {
            document.getElementById(id).classList.toggle('collapsed');
        }

        // Drag and Drop
        function setupDragAndDrop() {
            ['cover', 'avatar'].forEach(type => {
                const zone = document.getElementById(type + 'Zone');

                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.style.borderColor = 'var(--primary)';
                });

                zone.addEventListener('dragleave', () => {
                    zone.style.borderColor = '';
                });

                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.style.borderColor = '';

                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        const input = zone.querySelector('input[type="file"]');
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        input.files = dataTransfer.files;
                        uploadImage(input, type);
                    }
                });
            });
        }

        // Utilities
        function openPreview() {
            window.open('/', '_blank');
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.reload();
        }

        function addSocial() {
            alert('Social links feature coming in next update!');
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
